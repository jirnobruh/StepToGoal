<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — Шаг к цели</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>

<body class="min-h-screen flex flex-col font-cakra">

<header class="w-full px-10 py-6 flex justify-between items-center">
    <a href="../index.html">
        <img src="../images/icon-skull.svg" alt="Logo" class="w-12 h-12">
    </a>
    <button class="px-6 py-1 border border-black rounded-md text-sm hover:bg-white/50 transition">
        подписка
    </button>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-4">

    <div class="flex gap-4 mb-8 text-3xl font-bold">
        <button id="show-login" class="text-gray-800">Вход</button>
        <span class="text-gray-400">/</span>
        <button id="show-register" class="text-gray-400 hover:text-gray-600 transition">Регистрация</button>
    </div>

    <!-- Сообщение об ошибке/успехе -->
    <div id="message-box" class="w-full max-w-sm mb-4 p-4 rounded-lg hidden text-sm font-medium text-center">
    </div>

    <div class="w-full max-w-sm flex flex-col items-center">

        <!-- Tabs -->
        <div id="login-tabs" class="flex w-full mb-6 rounded-lg overflow-hidden border border-gray-400">
            <button id="tab-phone" class="flex-1 py-2 text-sm tab-active">телефон</button>
            <button id="tab-email" class="flex-1 py-2 text-sm tab-inactive">почта</button>
        </div>

        <!-- Login form -->
        <form id="login-form" class="w-full space-y-4">

            <!-- Phone input -->
            <div id="phone-input" class="relative">
                <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none gap-2">
                    🇷🇺
                    <span class="text-gray-700 font-semibold">+7</span>
                </div>

                <input type="tel"
                       class="w-full pl-24 pr-4 py-3 rounded-xl input-field focus:outline-none focus:ring-1 focus:ring-blue-900 transition text-center"
                       placeholder="___ ___ __ __">
            </div>

            <!-- Email input -->
            <div id="email-input" class="hidden">
                <input type="email"
                       class="w-full px-4 py-3 rounded-xl input-field text-center focus:outline-none"
                       placeholder="example@mail.ru">
            </div>

            <button type="submit"
                    class="w-full py-3 mt-6 text-white rounded-xl btn-dark hover:opacity-90 transition font-semibold">
                Войти
            </button>

            <button type="button" id="forgot-password-btn"
                    class="w-full py-2 mt-2 text-gray-600 text-sm hover:text-gray-800 transition">
                Забыли пароль?
            </button>
        </form>

        <!-- Recovery form -->
        <form id="recovery-form" class="w-full space-y-4 hidden">
            <input type="email" id="recovery-email" placeholder="Введите ваш email" 
                   class="w-full px-4 py-3 rounded-xl input-field text-center focus:outline-none" required>

            <button type="submit"
                    class="w-full py-3 text-white rounded-xl btn-dark hover:opacity-90 transition font-semibold">
                Отправить письмо
            </button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="w-full space-y-3 hidden">
            <input type="text" id="reg-first-name" placeholder="Имя" class="w-full px-4 py-2 rounded-xl input-field text-center" required>
            <input type="text" id="reg-last-name" placeholder="Фамилия" class="w-full px-4 py-2 rounded-xl input-field text-center" required>
            <input type="text" id="reg-middle-name" placeholder="Отчество" class="w-full px-4 py-2 rounded-xl input-field text-center">
            <div id="reg-phone-container" class="relative">
                <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none gap-2">
                    🇷🇺
                    <span class="text-gray-700 font-semibold">+7</span>
                </div>
                <input type="tel" id="reg-phone"
                       class="w-full pl-24 pr-4 py-2 rounded-xl input-field focus:outline-none focus:ring-1 focus:ring-blue-900 transition text-center"
                       placeholder="___ ___ __ __" required>
            </div>
            <input type="email" id="reg-email" placeholder="Почта" class="w-full px-4 py-2 rounded-xl input-field text-center">

            <input type="password" id="reg-password" placeholder="Пароль" class="w-full px-4 py-2 rounded-xl input-field text-center" required>
            <input type="password" id="reg-password-confirm" placeholder="Подтвердите пароль" class="w-full px-4 py-2 rounded-xl input-field text-center" required>

            <button type="submit"
                    class="w-full py-3 mt-4 text-white rounded-xl btn-dark hover:opacity-90 transition font-semibold">
                Зарегистрироваться
            </button>
        </form>
    </div>
</main>
<script type="module" src="../Backend/auth-ui.js"></script>
</body>
</html>
